<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRIS105 · Asistente de Agenda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #4f8ef7;
      --accent-dk: #3a72d8;
      --user-bg:   #1e3a5f;
      --bot-bg:    #1a1d27;
      --text:      #e2e6f0;
      --muted:     #7a7f94;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    #status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3ecf8e;
    }
    #status-dot.offline { background: #f66; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      gap: 4px;
    }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 3px;
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--muted);
      padding: 0 4px;
    }

    /* typing indicator */
    .typing .bubble {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .25; transform: scale(.9); }
      40%           { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Chips ── */
    #chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 14px;
      flex-shrink: 0;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 20px;
      padding: 6px 13px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); background: #1e2438; }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      resize: none;
      max-height: 120px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      padding: 0 18px;
      font-size: 20px;
      line-height: 1;
      transition: background .15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-dk); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 500px) {
      .msg { max-width: 92%; }
      #chips { padding: 0 12px 12px; }
      #input-bar { padding: 10px 12px; }
      #messages { padding: 14px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">IR</div>
  <div>
    <h1>IRIS105 · Asistente de Agenda</h1>
    <p>Consultas en lenguaje natural sobre citas y no-shows</p>
  </div>
  <div id="status-dot" title="Conectado"></div>
</header>

<div id="messages"></div>

<div id="chips">
  <button class="chip">¿Cuál es la tasa de no-show actual?</button>
  <button class="chip">¿Qué especialidad tiene más inasistencias?</button>
  <button class="chip">¿Cómo va la ocupación esta semana?</button>
  <button class="chip">¿Cuál fue el día más ocupado?</button>
</div>

<div id="input-bar">
  <textarea id="input" rows="1" placeholder="Escribe tu pregunta…"></textarea>
  <button id="send-btn" title="Enviar">&#9658;</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const statusDot  = document.getElementById('status-dot');
  const chipsEl    = document.getElementById('chips');

  const STORAGE_KEY = 'iris105_chat_history';
  let history = [];

  // ── Restore session history ──────────────────────────────────────
  try {
    const saved = sessionStorage.getItem(STORAGE_KEY);
    if (saved) {
      history = JSON.parse(saved);
      history.forEach(msg => {
        if (msg.role === 'user')      appendMsg('user', textFromContent(msg.content));
        else if (msg.role === 'assistant') appendMsg('bot', textFromContent(msg.content));
      });
    } else {
      appendMsg('bot', '¡Hola! Soy el asistente de IRIS105. Puedo responder preguntas sobre citas, no-shows, ocupación y médicos. ¿En qué te ayudo?');
    }
  } catch { /* sessionStorage no disponible */ }

  // ── Chips ────────────────────────────────────────────────────────
  chipsEl.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.textContent;
      sendMessage();
    });
  });

  // ── Auto-resize textarea ──────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Send ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    // hide chips after first interaction
    chipsEl.style.display = 'none';

    appendMsg('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    const typingEl = appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: serializableHistory() }),
      });

      typingEl.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        appendMsg('bot', `Error ${res.status}: ${err.detail || 'No se pudo conectar con el servidor.'}`);
        setStatus(false);
        return;
      }

      const data = await res.json();
      history = data.history || history;
      saveHistory();
      appendMsg('bot', data.reply || '(Sin respuesta)');
      setStatus(true);

    } catch (err) {
      typingEl.remove();
      appendMsg('bot', 'No se pudo conectar con el servidor. Verifica que el servicio esté activo.');
      setStatus(false);
    } finally {
      setLoading(false);
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function appendMsg(role, text) {
    const wrap   = document.createElement('div');
    wrap.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = now();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendTyping() {
    const wrap   = document.createElement('div');
    wrap.className = 'msg bot typing';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    [1,2,3].forEach(() => {
      const d = document.createElement('div');
      d.className = 'dot';
      bubble.appendChild(d);
    });
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    inputEl.disabled = on;
  }

  function setStatus(ok) {
    statusDot.classList.toggle('offline', !ok);
    statusDot.title = ok ? 'Conectado' : 'Sin conexión';
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function now() {
    return new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' });
  }

  function textFromContent(content) {
    if (typeof content === 'string') return content;
    if (Array.isArray(content)) {
      const block = content.find(b => b.type === 'text');
      return block ? block.text : '';
    }
    return '';
  }

  // Only serialize user/assistant text messages — strip tool_use blocks
  function serializableHistory() {
    return history.filter(m => {
      if (m.role === 'user' && Array.isArray(m.content)) {
        return m.content.some(b => b.type === 'text');
      }
      if (m.role === 'assistant' && Array.isArray(m.content)) {
        return m.content.some(b => b.type === 'text');
      }
      return typeof m.content === 'string';
    }).map(m => ({
      role: m.role,
      content: typeof m.content === 'string'
        ? m.content
        : m.content.filter(b => b.type === 'text'),
    }));
  }

  function saveHistory() {
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(history)); } catch {}
  }
</script>
</body>
</html>
